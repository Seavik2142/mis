services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: salesmis
      POSTGRES_USER: salesmis
      POSTGRES_PASSWORD: salesmis
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salesmis -d salesmis"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://salesmis:salesmis@postgres:5432/salesmis
      JWT_SECRET_KEY: local-development-secret-change-before-production
      INITIAL_ADMIN_EMAIL: ahzarky@gmail.com
      INITIAL_ADMIN_PASSWORD: 123456
      SEED_DEMO_DATA: "false"
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend

volumes:
  postgres_data:
